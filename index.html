  --y:#f5c84c; --yd:#c79a1f;
  --b:#5aa9e6; --bd:#2f7bb8;
  --p:#f08fb0; --pd:#c85c80;
  --g:#6fc499; --gd:#3e9268;
  --v:#a78bd9; --vd:#7958b3;
  --ok:#3e9268; --err:#e6694a;
  --r-sm:14px; --r-md:22px; --r-lg:30px; --r-pill:999px;
  --shadow:0 6px 0 rgba(0,0,0,.12);
  --soft:0 10px 24px rgba(35,75,61,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--paper);color:var(--ink);overscroll-behavior-y:contain}
#app{min-height:100dvh;display:flex;flex-direction:column}

/* ── Typography ──────────────────────────────────────────────────── */
h1,h2,h3{font-weight:800;line-height:1.15}
.num{font-weight:800;font-variant-numeric:tabular-nums}

/* ── BigButton ───────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;cursor:pointer;font-weight:700;font-size:1.15rem;
  border-radius:var(--r-md);transition:transform .08s,box-shadow .08s;
  padding:16px 24px;min-height:62px;width:100%;user-select:none;
}
.btn:active{transform:translateY(4px)!important;box-shadow:0 2px 0 rgba(0,0,0,.1)!important}
.btn-board{background:var(--board);color:#fff;border:3px solid var(--board2);box-shadow:var(--shadow)}
.btn-out  {background:#fff;color:var(--board);border:3px solid var(--board);box-shadow:var(--shadow)}
.btn-sm   {font-size:1rem;padding:10px 18px;min-height:46px;border-radius:var(--r-sm)}
.btn-ok   {background:var(--ok);color:#fff;border:3px solid #2a6647;box-shadow:0 5px 0 #2a6647}
.btn-err  {background:var(--err);color:#fff;border:3px solid #a0371a;box-shadow:0 5px 0 #a0371a}

/* ── Card ────────────────────────────────────────────────────────── */
.card{background:#fff;border-radius:var(--r-md);box-shadow:var(--soft);padding:20px}
.card-tap{cursor:pointer;transition:transform .1s}
.card-tap:active{transform:scale(.97)}

/* ── TopBar ──────────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;min-height:54px}
.topbar-light .topbar-title{color:#fff}
.topbar-btn{background:none;border:none;font-size:28px;cursor:pointer;padding:6px 10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;color:inherit}
.topbar-title{font-size:1.2rem;font-weight:700;flex:1}

/* ── Progress bar ────────────────────────────────────────────────── */
.pbar-wrap{height:10px;background:var(--paper2);border-radius:var(--r-pill);overflow:hidden}
.pbar-fill{height:100%;border-radius:var(--r-pill);transition:width .5s ease}

/* ── Stars ───────────────────────────────────────────────────────── */
.stars{display:flex;gap:4px}
.star{font-size:22px;filter:grayscale(1) opacity(.25)}
.star.on{filter:none}

/* ── Input ───────────────────────────────────────────────────────── */
.txt-input{
  padding:14px 18px;font-size:1.3rem;font-weight:700;
  border:3px solid var(--board);border-radius:var(--r-md);
  outline:none;text-align:center;width:100%;background:var(--paper);color:var(--ink);
}

/* ── NumberPad ───────────────────────────────────────────────────── */
.numpad-display{
  min-width:110px;min-height:64px;background:#fff;
  border:3px solid var(--board);border-radius:var(--r-md);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;font-weight:800;color:var(--board);letter-spacing:2px;
}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:216px}
.numpad-key{
  background:#fff;border:3px solid var(--board);color:var(--board);
  border-radius:var(--r-sm);font-size:1.6rem;font-weight:800;
  cursor:pointer;min-height:60px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 var(--board);transition:transform .08s,box-shadow .08s;
}
.numpad-key:active{transform:translateY(3px);box-shadow:0 1px 0 var(--board)}
.numpad-key.del{background:var(--paper2);border-color:#ccc;box-shadow:0 4px 0 #ccc;font-size:1.2rem;color:var(--ink2)}
.numpad-key.ok {background:var(--board);color:#fff;border-color:var(--board2);box-shadow:0 4px 0 var(--board2)}

/* ── Choice buttons ──────────────────────────────────────────────── */
.choices{display:grid;gap:12px;width:100%;max-width:380px}
.choices.cols2{grid-template-columns:1fr 1fr}
.choice-btn{
  background:#fff;border:3px solid var(--board);color:var(--board);
  border-radius:var(--r-md);font-size:1.25rem;font-weight:700;
  cursor:pointer;min-height:68px;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:transform .08s,box-shadow .08s;text-align:center;padding:8px 12px;
}
.choice-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.1)}
.choice-btn.correct{background:var(--ok);color:#fff;border-color:#2a6647}
.choice-btn.wrong  {background:var(--err);color:#fff;border-color:#a0371a}

/* ── Emojis visual ───────────────────────────────────────────────── */
.emoji-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px 0}
.emoji-group span{font-size:42px;line-height:1.15}

/* ── Shape SVG ───────────────────────────────────────────────────── */
.shape-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}

/* ── Sequence visual ─────────────────────────────────────────────── */
.seq-wrap{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.seq-box{
  width:54px;height:54px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:800;box-shadow:0 3px 0 rgba(0,0,0,.1);
}
.seq-box.num{background:#fff;border:2px solid var(--paper2)}
.seq-box.miss{background:var(--y);border:2px solid var(--yd);color:var(--board)}

/* ── Bars visual ─────────────────────────────────────────────────── */
.bars-wrap{display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-weight:700;font-size:1.1rem;min-width:28px}
.bar-track{height:26px;flex:1;background:var(--paper2);border-radius:var(--r-pill);overflow:hidden}
.bar-fill{height:100%;border-radius:var(--r-pill)}

/* ── Clock SVG ───────────────────────────────────────────────────── */
.clock-wrap{display:flex;justify-content:center}

/* ── Coins ───────────────────────────────────────────────────────── */
.coins-wrap{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.coin{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#3a2800;flex-shrink:0;
  border:3px solid rgba(0,0,0,.15);box-shadow:0 3px 0 rgba(0,0,0,.12);
}

/* ── Badge ───────────────────────────────────────────────────────── */
.badge{display:flex;flex-direction:column;align-items:center;gap:4px;max-width:90px;text-align:center}
.badge-icon{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px}
.badge-icon.earned{background:var(--y);border:3px solid var(--yd)}
.badge-icon.locked{background:var(--paper2);border:3px solid #ccc;filter:grayscale(1);opacity:.4}
.badge-label{font-size:.78rem;font-weight:700;line-height:1.2}

/* ── Screens ──────────────────────────────────────────────────────── */
.screen{display:none;flex-direction:column;min-height:100dvh;animation:pop .22s ease-out}
.screen.active{display:flex}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* Onboarding */
#s-onboarding{background:var(--board);align-items:center;justify-content:center;gap:24px;padding:24px}

/* Home header */
.home-header{background:var(--board);padding:20px 20px 28px;display:flex;flex-direction:column;gap:12px}

/* Domain card accent */
.domain-card{border-left:6px solid var(--accent,#ccc)}

/* Marelle path */
.skill-path{display:flex;flex-direction:column;gap:0;padding:20px}
.skill-connector{width:3px;height:26px;border-left:3px dashed var(--accent,#ccc);margin:0 0 0 42px}
.skill-tile{
  width:88%;border-radius:var(--r-lg);padding:14px 16px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  box-shadow:var(--soft);background:#fff;border:3px solid var(--accent,#ccc);
  transition:transform .1s;
}
.skill-tile.locked{background:var(--paper2);box-shadow:none;opacity:.55;cursor:not-allowed;border-color:#ccc}
.skill-tile.right{align-self:flex-end}
.skill-tile:not(.locked):active{transform:scale(.97)}
.skill-icon{width:48px;height:48px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--accent,#ccc)}
.skill-icon.locked-icon{background:#ccc}

/* Exercise */
.ex-header{background:var(--board);padding:4px 0}
.ex-body{flex:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px;max-width:480px;width:100%;margin:0 auto;overflow-y:auto}
.prompt{font-size:1.25rem;font-weight:700;text-align:center;line-height:1.4;white-space:pre-line;max-width:360px}
.visual-box{background:#fff;border-radius:var(--r-md);padding:16px;box-shadow:var(--soft);display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:360px}
.hint-box{background:var(--paper2);border:2px dashed var(--yd);border-radius:var(--r-md);padding:10px 16px;font-size:.95rem;color:var(--ink2);text-align:center;max-width:340px}

/* Result */
#s-result{align-items:center;justify-content:center;padding:24px;gap:24px}
.result-score{background:#fff;border-radius:var(--r-lg);padding:20px 40px;box-shadow:var(--soft);display:flex;flex-direction:column;align-items:center;gap:8px}

/* Progress screen */
.progress-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:28px;max-width:480px;width:100%;margin:0 auto}
.comp-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:var(--r-sm)}

/* Mascot SVG inlined */
.mascot{display:block}

/* ── Celebration 100% ────────────────────────────────────────────── */
@keyframes confetti-drop{
  0%  {transform:translate(0,-20px) rotate(0deg) scale(1);opacity:1}
  100%{transform:translate(var(--dx,0),110vh) rotate(var(--rot,540deg)) scale(.6);opacity:0}
}
@keyframes star-fly{
  0%  {transform:translate(0,0) scale(.4);opacity:1}
  100%{transform:translate(var(--sx,0),var(--sy,-80px)) scale(1.3);opacity:0}
}
@keyframes parfait-pop{
  0%  {transform:scale(.3) rotate(-8deg);opacity:0}
  55% {transform:scale(1.18) rotate(3deg);opacity:1}
  75% {transform:scale(.96) rotate(-1deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes dog-bounce{
  0%,100%{transform:translateY(0)}
  40%    {transform:translateY(-14px)}
  70%    {transform:translateY(-6px)}
}
.confetti-bit{
  position:fixed;width:10px;height:14px;border-radius:3px;
  top:0;pointer-events:none;z-index:9998;
  animation:confetti-drop linear both;
}
.star-bit{
  position:fixed;font-size:22px;pointer-events:none;z-index:9998;
  animation:star-fly ease-out both;
}
#parfait-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:9999;
}
.parfait-label{
  font-size:2.6rem;font-weight:900;
  color:#fff;background:var(--board);
  padding:18px 36px;border-radius:var(--r-lg);
  border:5px solid var(--y);
  box-shadow:0 8px 0 var(--yd),0 0 40px rgba(245,200,76,.4);
  animation:parfait-pop .55s cubic-bezier(.2,1.4,.4,1) both;
}
#result-dog.bouncing{animation:dog-bounce .5s ease-in-out 3}
</style>

let STATE = {

};

function load(){
  try{const r=localStorage.getItem('petitmath:v1');if(r){const d=JSON.parse(r);if(d&&d.name)STATE=d;}}catch(e){}
  // Initialise les compétences manquantes
  SKILLS.forEach(sk=>{if(!STATE.skills[sk.id])STATE.skills[sk.id]={stars:0,best:0,attempts:0};});
}
function save(){try{localStorage.setItem('petitmath:v1',JSON.stringify(STATE));}catch(e){}}

function totalSeries(sk){ return Object.values(sk||STATE.skills).reduce((a,s)=>a+s.attempts,0); }
function domainMastered(sk,dom){
  return SKILLS.filter(s=>s.domain===dom).every(s=>(sk||STATE.skills)[s.id]?.stars>=3);
}
function skillStatus(id){
  const sk=SKILLS.find(s=>s.id===id);
  if(!sk) return 'locked';
  if(sk.order===1) return 'available';
  const prev=SKILLS.find(s=>s.domain===sk.domain&&s.order===sk.order-1);
  if(!prev) return 'available';
  return STATE.skills[prev.id]?.best>=60 ? 'available' : 'locked';
}
function overallPct(){
  const total=SKILLS.length*3;
  const earned=SKILLS.reduce((a,s)=>a+(STATE.skills[s.id]?.stars||0),0);
  return Math.round(earned/total*100);
}
function domainPct(dom){
  const sk=SKILLS.filter(s=>s.domain===dom);
  const earned=sk.reduce((a,s)=>a+(STATE.skills[s.id]?.stars||0),0);
  return Math.round(earned/(sk.length*3)*100);
}
function starsFromPct(p){ return p>=90?3:p>=60?2:p>=40?1:0; }

/* ═══════════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════════ */
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[ri(0,arr.length-1)];}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function numChoices(correct,spread,min,max){
  const s=new Set([correct]);
  let g=0;while(s.size<3&&g<30){g++;const c=correct+ri(-spread,spread)||(correct===max?-1:1);if(c>=min&&c<=max)s.add(c);}
  return shuffle([...s].map(String));
}

const GENERATORS = {

  genComparer(){

  genComp10(){

  genProbAdd(){

/* ═══════════════════════════════════════════════════════════════════
   RENDU VISUEL (ContentBlock)
═══════════════════════════════════════════════════════════════════ */
function renderVisual(v){
  if(!v) return '';
  switch(v.type){
    case 'emojis':{
      const sz=v.items.length>16?'28px':v.items.length>10?'36px':v.items.length>6?'42px':'50px';
      return `<div class="emoji-group">${v.items.map(e=>`<span style="font-size:${sz}">${e}</span>`).join('')}</div>`;
    }
    case 'shape':
      return renderShape(v.shape);
    case 'clock':
      return renderClock(v.h);
    case 'coins':
      return renderCoins(v.values);
    case 'bars':
      return renderBars(v.bars);
    case 'sequence':
      return renderSeq(v.items);
    default: return '';
  }
}
function renderShape(s){
  const SVGS={
    carré:'<rect x="15" y="15" width="70" height="70" rx="3" fill="none" stroke="var(--b)" stroke-width="5"/>',
    rectangle:'<rect x="8" y="22" width="84" height="56" rx="3" fill="none" stroke="var(--p)" stroke-width="5"/>',
    triangle:'<polygon points="50,12 90,85 10,85" fill="none" stroke="var(--g)" stroke-width="5" stroke-linejoin="round"/>',
    cercle:'<circle cx="50" cy="50" r="38" fill="none" stroke="var(--v)" stroke-width="5"/>',
  };
  return `<div class="shape-wrap"><svg viewBox="0 0 100 100" width="90" height="90">${SVGS[s]||''}</svg></div>`;
}
function renderClock(h){
  const cx=60,cy=60,r=52;
  const ha=(((h%12)/12)*2*Math.PI)-Math.PI/2;
  const hx=cx+Math.cos(ha)*33, hy=cy+Math.sin(ha)*33;
  // Graduations (on saute 12/3/6/9 qui ont des chiffres)
  const ticks=Array.from({length:12},(_,i)=>{
    if(i%3===0) return ''; // position chiffre — pas de trait
    const a=(i/12)*2*Math.PI-Math.PI/2;
    return `<line x1="${cx+Math.cos(a)*(r-8)}" y1="${cy+Math.sin(a)*(r-8)}" x2="${cx+Math.cos(a)*(r-2)}" y2="${cy+Math.sin(a)*(r-2)}" stroke="#aaa" stroke-width="1.5"/>`;
  }).join('');
  // Chiffres 12, 3, 6, 9
  const NUMS=[{n:'12',x:60,y:13},{n:'3',x:108,y:61},{n:'6',x:60,y:109},{n:'9',x:12,y:61}];
  const nums=NUMS.map(p=>`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="900" fill="#222" font-family="sans-serif">${p.n}</text>`).join('');
  return `<div class="clock-wrap"><svg viewBox="0 0 120 120" width="158" height="158">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#fffef8" stroke="#333" stroke-width="3.5"/>
    <circle cx="${cx}" cy="${cy}" r="${r-1}" fill="none" stroke="#ccc" stroke-width="1"/>
    ${ticks}${nums}
    <line x1="${cx}" y1="${cy}" x2="${hx}" y2="${hy}" stroke="#222" stroke-width="6" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-42}" stroke="#e6694a" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="#222"/>
  </svg></div>`;
}
function renderCoins(vals){
  const cl={1:'#E8A020',2:'#C0C0C0',5:'#F5C84C',10:'#F5C84C'};
  const brd={1:'#A06010',2:'#909090',5:'#C79A1F',10:'#C79A1F'};
  return `<div class="coins-wrap">${vals.map(v=>`<div class="coin" style="width:${v>=10?52:44}px;height:${v>=10?52:44}px;background:${cl[v]||'#ccc'};border-color:${brd[v]||'#999'}">${v}€</div>`).join('')}</div>`;
}
function renderBars(bars){
  const max=Math.max(...bars.map(b=>b.n));
  const cols=['var(--b)','var(--p)','var(--g)','var(--y)'];
  return `<div class="bars-wrap">${bars.map((b,i)=>`
    <div class="bar-row">
      <span class="bar-label">${b.l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(b.n/max*100)}%;background:${cols[i%cols.length]}"></div></div>
    </div>`).join('')}</div>`;
}
function renderSeq(items){
  return `<div class="seq-wrap">${items.map(it=>`<div class="seq-box ${it==='?'?'miss':'num'}">${it}</div>`).join('')}</div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   SKILL PATH (Marelle)
═══════════════════════════════════════════════════════════════════ */
let currentDomain=null;
function showSkills(domId){
  currentDomain=domId;
  const dom=DOMAINS.find(d=>d.id===domId);
  const c=`var(${dom.c})`;
  document.getElementById('skill-header-title').textContent=`${dom.icon} ${dom.label}`;
  document.getElementById('skill-header').style.background='var(--board)';

  const skills=SKILLS.filter(s=>s.domain===domId).sort((a,b)=>a.order-b.order);
  const path=document.getElementById('skill-path');
  path.innerHTML='';

  skills.forEach((sk,idx)=>{
    const status=skillStatus(sk.id);
    const locked=status==='locked';
    const sp=STATE.skills[sk.id]||{stars:0};
    const isRight=idx%2!==0;

    if(idx>0){
      const conn=document.createElement('div');
      conn.className='skill-connector';
      conn.style.cssText=`border-color:${locked?'#ccc':c};opacity:${locked?.4:1};margin-left:${isRight?'auto':'42px'};margin-right:${isRight?'42px':'auto'};`;
      path.appendChild(conn);
    }

    const tile=document.createElement('div');
    tile.className=`skill-tile${locked?' locked':''}${isRight?' right':''}`;
    tile.style.cssText=`border-color:${locked?'#ccc':c};`;
    tile.innerHTML=`
      <div class="skill-icon${locked?' locked-icon':''}" style="background:${locked?'#ccc':c}">
        ${locked?'🔒':sp.stars===3?'✅':sk.icon}
      </div>

        ${!locked?`<div class="stars">${[1,2,3].map(n=>`<span class="star${n<=sp.stars?' on':''}"">⭐</span>`).join('')}</div>`:''}
      </div>
      ${!locked?'<span style="font-size:18px;color:var(--ink2)">›</span>':''}
    `;
    if(!locked) tile.onclick=()=>startExercise(sk.id);
    path.appendChild(tile);
  });
  showScreen('s-skills');
}

/* ═══════════════════════════════════════════════════════════════════
   EXERCICE ENGINE
═══════════════════════════════════════════════════════════════════ */
let EX={skill:null, phase:'expl', questions:[], idx:0, correct:0, guided:false};

function startExercise(skillId){
  const sk=SKILLS.find(s=>s.id===skillId);
  if(!sk) return;
  STATE.lastSkillId=skillId;
  EX={skill:sk, phase:'expl', questions:[], idx:0, correct:0, guided:false};
  document.getElementById('ex-back-btn').onclick=()=>{
    if(currentDomain) showSkills(currentDomain); else showScreen('s-home');
  };
  showScreen('s-exercise');
  renderPhaseExpl();
}

function renderPhaseExpl(){
  EX.phase='expl';
  const sk=EX.skill;
  document.getElementById('ex-title').textContent=sk.title;
  document.getElementById('ex-counter').textContent='';
  document.getElementById('ex-pbar').style.width='0%';
  const dom=DOMAINS.find(d=>d.id===sk.domain);
  const c=`var(${dom.c})`;

  document.getElementById('ex-body').innerHTML=`
    <div class="card" style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px;align-items:center">
      <p style="font-weight:700;font-size:1.05rem;color:var(--board)">📖 Je t'explique…</p>
      <p style="font-size:1.1rem;text-align:center;line-height:1.5">${sk.expl}</p>
    </div>
    <button class="btn" style="background:${c};color:#fff;border:3px solid ${`var(${dom.cd})`};box-shadow:0 5px 0 ${`var(${dom.cd})`};max-width:380px" onclick="renderPhaseExemple()">
      👀 Voir un exemple
    </button>`;
}

function renderPhaseExemple(){
  EX.phase='exemple';
  const sk=EX.skill;
  const ex=sk.exemple;
  const dom=DOMAINS.find(d=>d.id===sk.domain);
  const c=`var(${dom.c})`;

  document.getElementById('ex-body').innerHTML=`
    <div class="card" style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;align-items:center">
      <p style="font-weight:700;font-size:1.05rem;color:var(--board)">📌 Regarde cet exemple</p>
      <p class="prompt">${ex.prompt}</p>
      ${ex.v?`<div class="visual-box" style="padding:10px">${renderVisual(ex.v)}</div>`:''}
      <div style="background:var(--paper);border-radius:var(--r-sm);padding:10px 16px;font-weight:700;font-size:1.1rem;color:var(--board)">
        Réponse : ${ex.answer}
      </div>
    </div>
    <button class="btn" style="background:${c};color:#fff;border:3px solid ${`var(${dom.cd})`};box-shadow:0 5px 0 ${`var(${dom.cd})`};max-width:380px" onclick="startGuided()">
      ✏️ S'entraîner
    </button>`;
}

function startGuided(){
  const sk=EX.skill;
  EX.guided=true;
  EX.questions=Array.from({length:sk.guided},()=>GENERATORS[sk.gen]());
  EX.idx=0; EX.correct=0;
  renderQuestion();
}

function startAutonomous(){
  const sk=EX.skill;
  if(!sk) return;
  EX.guided=false;
  EX.questions=Array.from({length:sk.auto},()=>GENERATORS[sk.gen]());
  EX.idx=0; EX.correct=0;
  numpadVal='';
  showScreen('s-exercise');
  renderQuestion();
}

function renderQuestion(){
  const q=EX.questions[EX.idx];
  const total=EX.questions.length;
  const dom=DOMAINS.find(d=>d.id===EX.skill.domain);
  const c=`var(${dom.c})`;

  document.getElementById('ex-title').textContent=(EX.guided?'Entraînement — ':'Exercice — ')+EX.skill.short;
  document.getElementById('ex-counter').textContent=`${EX.idx+1}/${total}`;
  document.getElementById('ex-pbar').style.cssText=`width:${Math.round(EX.idx/total*100)}%;background:${c}`;

  let answerHTML='';
  if(q.type==='choice'){
    const cols=q.choices.length<=2?'':'cols2';
    answerHTML=`<div class="choices ${cols}" id="choices">
      ${q.choices.map(ch=>`<button class="choice-btn" onclick="handleChoice(this,'${ch.replace(/'/g,"\\'")}','${String(q.answer).replace(/'/g,"\\'")}',${EX.guided})">${ch}</button>`).join('')}
    </div>`;
  } else {
    answerHTML=`
      <div class="numpad-display" id="numpad-display">—</div>
      <div class="numpad-grid">
        ${['7','8','9','4','5','6','1','2','3'].map(k=>`<button class="numpad-key" onclick="numpadPress('${k}')">${k}</button>`).join('')}
        <button class="numpad-key del" onclick="numpadDel()">⌫</button>
        <button class="numpad-key" onclick="numpadPress('0')">0</button>
        <button class="numpad-key ok" onclick="numpadConfirm(${q.answer})">✓</button>
      </div>`;
  }

  document.getElementById('ex-body').innerHTML=`
    <p class="prompt">${q.prompt}</p>
    ${q.v?`<div class="visual-box">${renderVisual(q.v)}${q.v2?`<span style="font-size:20px;color:var(--ink2)">+</span>${renderVisual(q.v2)}`:''}</div>`:''}
    ${EX.guided&&q.hint?`<div class="hint-box">💡 ${q.hint}</div>`:''}
    ${answerHTML}`;
}

function handleChoice(btn, chosen, correct, guided){
  const ok=(chosen===correct);
  btn.classList.add(ok?'correct':'wrong');
  if(!ok && guided){
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent.trim()===correct) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
  setTimeout(()=>nextQuestion(ok), ok?450:guided?1400:800);
}

let numpadVal='';
function numpadPress(k){
  if(numpadVal.length>=3) return;
  numpadVal+=k;
  const el=document.getElementById('numpad-display');
  if(el) el.textContent=numpadVal;
}
function numpadDel(){
  numpadVal=numpadVal.slice(0,-1);
  const el=document.getElementById('numpad-display');
  if(el) el.textContent=numpadVal||'—';
}
function numpadConfirm(correct){
  if(!numpadVal) return;
  const ok=parseInt(numpadVal)===correct;
  numpadVal='';
  nextQuestion(ok);
}

function nextQuestion(ok){
  if(ok) EX.correct++;
  EX.idx++;
  if(EX.idx<EX.questions.length){ renderQuestion(); }
  else if(EX.guided){ showGuidedResult(); }
  else { showFinalResult(); }
}

function showGuidedResult(){
  const pct=Math.round(EX.correct/EX.questions.length*100);
  const dom=DOMAINS.find(d=>d.id===EX.skill.domain);
  const c=`var(${dom.c})`;
  document.getElementById('ex-body').innerHTML=`
    <p style="font-size:1.5rem;font-weight:800;text-align:center">✏️ Entraînement terminé !</p>
    <div class="card" style="width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:8px">
      <span style="font-size:2.5rem;font-weight:800;color:var(--board)">${EX.correct}/${EX.questions.length}</span>
    </div>
    <button class="btn" style="background:${c};color:#fff;border:3px solid var(${dom.cd});box-shadow:0 5px 0 var(${dom.cd});max-width:380px" onclick="startAutonomous()">
      ▶️ Passer aux exercices
    </button>`;
}

/* ═══════════════════════════════════════════════════════════════════
   PROCHAIN EXERCICE
═══════════════════════════════════════════════════════════════════ */
function getNextSkillId(currentId){
  const cur=SKILLS.find(s=>s.id===currentId);
  if(!cur) return null;
  // Compétence suivante dans le même domaine
  const dom=SKILLS.filter(s=>s.domain===cur.domain).sort((a,b)=>a.order-b.order);
  const idx=dom.findIndex(s=>s.id===currentId);
  if(idx>=0 && idx+1<dom.length && skillStatus(dom[idx+1].id)!=='locked')
    return dom[idx+1].id;
  // Première compétence disponible dans le domaine suivant
  const dIdx=DOMAINS.findIndex(d=>d.id===cur.domain);
  for(let i=dIdx+1;i<DOMAINS.length;i++){
    const first=SKILLS
      .filter(s=>s.domain===DOMAINS[i].id)
      .sort((a,b)=>a.order-b.order)
      .find(s=>skillStatus(s.id)!=='locked');
    if(first) return first.id;
  }
  return null;
}

function showFinalResult(){
  const sk=EX.skill;
  const total=EX.questions.length;
  const pct=Math.round(EX.correct/total*100);
  const stars=starsFromPct(pct);

  // Mise à jour progression
  const prev=STATE.skills[sk.id]||{stars:0,best:0,attempts:0};
  STATE.skills[sk.id]={
    stars:Math.max(prev.stars,stars),
    best:Math.max(prev.best,pct),
    attempts:prev.attempts+1,
  };
  STATE.totalSeries=(STATE.totalSeries||0)+1;

  // Déblocage compétence suivante
  let unlocked=false;
  if(pct>=60){
    const domSkills=SKILLS.filter(s=>s.domain===sk.domain).sort((a,b)=>a.order-b.order);
    const idx=domSkills.findIndex(s=>s.id===sk.id);
    if(idx>=0&&idx+1<domSkills.length){
      const nxt=domSkills[idx+1];
      if(skillStatus(nxt.id)==='available'&&!STATE.skills[nxt.id]?.attempts)
        unlocked=true;
    }
  }

  // Badges
  const newBadges=BADGES.filter(b=>!STATE.badges.includes(b.id)&&b.cond(STATE.skills));
  newBadges.forEach(b=>STATE.badges.push(b.id));

  // Mise à jour "Continuer" → pointe sur le prochain exercice
  const nextId=getNextSkillId(sk.id);
  STATE.lastSkillId=nextId||sk.id;

  save();

  // Affichage résultat
  document.getElementById('result-title').textContent=
    pct>=90?`Bravo ${STATE.name} ! 🏆`:pct>=60?`Bien joué ${STATE.name} ! 🎉`:`Continue, tu peux le faire ! 💪`;
  document.getElementById('result-fraction').textContent=`${EX.correct}/${total}`;
  document.getElementById('result-pct').textContent=`${pct} %`;
  document.getElementById('result-stars').innerHTML=
    [1,2,3].map(n=>`<span class="star${n<=stars?' on':''}">⭐</span>`).join('');

  const unlockEl=document.getElementById('result-unlock');
  unlockEl.style.display=unlocked?'block':'none';

  const badgeEl=document.getElementById('result-badge');
  if(newBadges.length>0){
    badgeEl.style.display='block';
    badgeEl.innerHTML=`<p style="font-weight:700;margin-bottom:8px">🎖️ Nouveau badge !</p>`+
      newBadges.map(b=>`<p style="font-size:1.3rem">${b.icon} <strong>${b.label}</strong></p><p style="font-size:.85rem;margin-bottom:4px">${b.desc||''}</p>`).join('');
  } else { badgeEl.style.display='none'; }

  // Bouton "Exercice suivant" si 100% et un suivant existe
  const nextBtn=document.getElementById('btn-next-skill');
  if(pct===100 && nextId){
    const nextSk=SKILLS.find(s=>s.id===nextId);
    nextBtn.style.display='flex';
    nextBtn.textContent=`➡️ ${nextSk?nextSk.title:'Exercice suivant'} !`;
    nextBtn.onclick=()=>startExercise(nextId);
  } else { nextBtn.style.display='none'; }

  document.getElementById('btn-retry').onclick=startAutonomous;
  showScreen('s-result');

  // 🎉 Animation si score parfait !
  if(pct===100) setTimeout(showCelebration, 350);
}

/* ═══════════════════════════════════════════════════════════════════
   CÉLÉBRATION 100 %
═══════════════════════════════════════════════════════════════════ */
function showCelebration(){
  // Nettoie si déjà présent
  const old=document.getElementById('parfait-overlay');
  if(old) old.remove();
  document.querySelectorAll('.confetti-bit,.star-bit').forEach(e=>e.remove());

  const COLORS=['#f5c84c','#5aa9e6','#f08fb0','#6fc499','#a78bd9','#ff6b6b','#fff'];

  // Confettis
  for(let i=0;i<38;i++){
    const el=document.createElement('div');
    el.className='confetti-bit';
    const left=Math.random()*100;
    const dur=1.4+Math.random()*1.6;
    const delay=Math.random()*1.0;
    const color=COLORS[i%COLORS.length];
    const dx=(Math.random()-.5)*80+'px';
    const rot=(Math.random()>0.5?1:-1)*(360+Math.random()*360)+'deg';
    el.style.cssText=`left:${left}%;background:${color};animation-duration:${dur}s;animation-delay:${delay}s;--dx:${dx};--rot:${rot}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+delay)*1000+200);
  }

  // Étoiles qui partent du centre
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  ['⭐','🌟','✨','💫','🎉'].forEach((em,i)=>{
    const el=document.createElement('div');
    el.className='star-bit';
    const angle=(i/5)*2*Math.PI;
    const dist=80+Math.random()*60;
    const sx=Math.cos(angle)*dist+'px';
    const sy=Math.sin(angle)*dist+'px';
    const delay=i*0.08;
    el.textContent=em;
    el.style.cssText=`left:${cx}px;top:${cy}px;animation-duration:.9s;animation-delay:${delay}s;--sx:${sx};--sy:${sy}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1200);
  });

  // Texte "PARFAIT !"
  const overlay=document.createElement('div');
  overlay.id='parfait-overlay';
  overlay.innerHTML='<div class="parfait-label">PARFAIT ! 🌟</div>';
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.remove(),2200);

  // Filou qui saute
  const dog=document.getElementById('result-dog');
  if(dog){
    dog.classList.remove('bouncing');
    void dog.offsetWidth; // reflow
    dog.classList.add('bouncing');
    dog.addEventListener('animationend',()=>dog.classList.remove('bouncing'),{once:true});
  }
}
load();

document.getElementById('name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('btn-start').click();
});
document.getElementById('btn-start').onclick=()=>{
  const name=document.getElementById('name-input').value.trim()||'Champion';
  STATE.name=name;
  save();
  showScreen('s-home');
};

if(STATE.name){
  showScreen('s-home');
}
</script>
